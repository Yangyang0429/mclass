<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tomcat Doggy Game</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

h1 { text-align: center; color: #333; }
p { text-align: center; color: #666; }

/* 닥스훈트 */
#dog {
    width: 150px;
    position: absolute;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    transition: left 0.1s;
}

/* 발자국 */
.paw {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadePaw 3s forwards;
    z-index: 5;
}

@keyframes fadePaw {
    0% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
}

/* 공 */
.ball {
    position: absolute;
    font-size: 40px;
}

/* 점수판 */
#scoreboard {
    position: fixed;
    top: 10px;
    right: 20px;
    font-size: 24px;
    background: rgba(255,255,255,0.8);
    padding: 8px 12px;
    border-radius: 12px;
    z-index: 10;
    border: 2px solid #333;
}
</style>
</head>
<body>

<h1>Tomcat Web Server</h1>
<h1>🐶 Welcome</h1>
<p>닥스훈트 게임에 도전하세요!</p>

<img id="dog" src="https://contents.creators.mypetlife.co.kr/content/uploads/2021/10/09095442/img-751.jpg">

<div id="scoreboard">점수: 0</div>

<script>
// 게임 변수
let dog = document.getElementById("dog");
let scoreBoard = document.getElementById("scoreboard");
let dogX = window.innerWidth/2 - 75;
let dogWidth = 150;
let score = 0;

// 좌우 이동
document.addEventListener("keydown", (e) => {
    if(e.key === "ArrowLeft") dogX -= 30;
    if(e.key === "ArrowRight") dogX += 30;
    dogX = Math.max(0, Math.min(window.innerWidth - dogWidth, dogX));
    dog.style.left = dogX + "px";
});

// 마우스 발자국
document.addEventListener("mousemove", (e) => {
    const paw = document.createElement("div");
    paw.className = "paw";
    paw.innerHTML = "🐾";
    paw.style.left = e.pageX + "px";
    paw.style.top = e.pageY + "px";
    document.body.appendChild(paw);
    setTimeout(() => { paw.remove(); }, 3000);
});

// 공 생성
function createBall() {
    const ball = document.createElement("div");
    ball.className = "ball";
    ball.innerHTML = "🎾";
    ball.style.left = Math.random() * (window.innerWidth - 40) + "px";
    ball.style.top = "-50px";
    document.body.appendChild(ball);
    moveBall(ball);
}

// 공 이동
function moveBall(ball) {
    let top = -50;
    const speed = 4 + Math.random() * 3; // 랜덤 속도

    const interval = setInterval(() => {
        top += speed;
        ball.style.top = top + "px";

        // 충돌 체크
        const ballRect = ball.getBoundingClientRect();
        const dogRect = dog.getBoundingClientRect();

        if(ballRect.bottom > dogRect.top &&
           ballRect.left + ballRect.width > dogRect.left &&
           ballRect.left < dogRect.right) {
               score++;
               scoreBoard.innerHTML = "점수: " + score;
               ball.remove();
               createPawTrail(ballRect.left + ballRect.width/2, ballRect.top + ballRect.height/2);
               clearInterval(interval);
        }

        // 화면 아래로 사라지면 제거
        if(top > window.innerHeight) {
            ball.remove();
            clearInterval(interval);
        }
    }, 20);
}

// 발자국 효과
function createPawTrail(x, y) {
    for(let i=0;i<5;i++){
        setTimeout(() => {
            const paw = document.createElement("div");
            paw.className = "paw";
            paw.innerHTML = "🐾";
            paw.style.left = x + (Math.random()*30-15) + "px";
            paw.style.top = y + (Math.random()*30-15) + "px";
            paw.style.color = ["#FF6347","#FFD700","#ADFF2F","#00BFFF","#FF69B4"][Math.floor(Math.random()*5)];
            document.body.appendChild(paw);
            setTimeout(()=>paw.remove(), 3000);
        }, i*50);
    }
}

// 공 주기적으로 생성
setInterval(createBall, 2000);
</script>
</body>
</html>
