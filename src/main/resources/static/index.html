<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>3D Maze Game</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
}

#ui{
position:absolute;
top:10px;
left:10px;
z-index:10;
font-size:18px;
}

</style>

</head>

<body>

<div id="ui">
Stage : <span id="stage">1</span><br>
WASD 이동 / 마우스 시점
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

let scene = new THREE.Scene()

let camera = new THREE.PerspectiveCamera(
75,
window.innerWidth/window.innerHeight,
0.1,
1000
)

let renderer = new THREE.WebGLRenderer()

renderer.setSize(window.innerWidth,window.innerHeight)

document.body.appendChild(renderer.domElement)

let light = new THREE.PointLight(0xffffff,1)
light.position.set(10,20,10)

scene.add(light)

let ambient = new THREE.AmbientLight(0x555555)
scene.add(ambient)

let stage=1

let mazeSize=15
let maze=[]

let walls=[]

let goal

function generateMaze(){

maze=[]
walls.forEach(w=>scene.remove(w))
walls=[]

for(let y=0;y<mazeSize;y++){

maze[y]=[]

for(let x=0;x<mazeSize;x++){

let wall=Math.random()<0.3

if(x==1 && y==1) wall=false
if(x==mazeSize-2 && y==mazeSize-2) wall=false

maze[y][x]=wall?1:0

if(wall){

let geo=new THREE.BoxGeometry(1,2,1)
let mat=new THREE.MeshStandardMaterial({color:0x444444})

let cube=new THREE.Mesh(geo,mat)

cube.position.set(x,1,y)

scene.add(cube)

walls.push(cube)

}

}

}

let goalGeo=new THREE.BoxGeometry(1,1,1)

let goalMat=new THREE.MeshStandardMaterial({color:0xff0000})

goal=new THREE.Mesh(goalGeo,goalMat)

goal.position.set(mazeSize-2,0.5,mazeSize-2)

scene.add(goal)

}

generateMaze()

camera.position.set(1,1.7,1)

let velocity={x:0,z:0}

let keys={}

document.addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true)
document.addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false)

document.body.onclick=()=>{

document.body.requestPointerLock()

}

document.addEventListener("mousemove",e=>{

if(document.pointerLockElement===document.body){

camera.rotation.y -= e.movementX * 0.002
camera.rotation.x -= e.movementY * 0.002

camera.rotation.x=Math.max(-1.5,Math.min(1.5,camera.rotation.x))

}

})

function move(){

let speed=0.08

let dir=new THREE.Vector3()

camera.getWorldDirection(dir)

let right=new THREE.Vector3()

right.crossVectors(camera.up,dir).normalize()

if(keys["w"]){

camera.position.x += dir.x*speed
camera.position.z += dir.z*speed

}

if(keys["s"]){

camera.position.x -= dir.x*speed
camera.position.z -= dir.z*speed

}

if(keys["a"]){

camera.position.x += right.x*speed
camera.position.z += right.z*speed

}

if(keys["d"]){

camera.position.x -= right.x*speed
camera.position.z -= right.z*speed

}

}

function checkGoal(){

let dx=camera.position.x-goal.position.x
let dz=camera.position.z-goal.position.z

if(Math.sqrt(dx*dx+dz*dz)<1){

alert("🎉 Stage Clear!")

stage++

document.getElementById("stage").innerText=stage

mazeSize+=3

generateMaze()

camera.position.set(1,1.7,1)

}

}

function animate(){

requestAnimationFrame(animate)

move()

checkGoal()

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
