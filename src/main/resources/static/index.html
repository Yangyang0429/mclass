<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Extreme Maze Challenge</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #222;
    color:#fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    margin: 0;
    padding: 10px;
}
h1 { color:#ffbf00; }

#mazeContainer {
    width: 800px;
    height: 800px;
    overflow: auto;
    border: 3px solid #fff;
    position: relative;
    background: #111;
}

#maze {
    display: grid;
    grid-template-columns: repeat(50, 16px);
    grid-template-rows: repeat(50, 16px);
    gap:1px;
}

.cell {
    width:16px;
    height:16px;
    box-sizing:border-box;
}

.wall { background:#444; }
.player { background:#00f; }
.goal { background:#f00; }
.trap { background:#ff0; }

.paw {
    position:absolute;
    font-size:12px;
    pointer-events:none;
    transform:translate(-50%,-50%);
    animation:fadePaw 1s forwards;
    z-index:5;
}
@keyframes fadePaw {0%{opacity:1;}100%{opacity:0;transform:translate(-50%,-50%) scale(0.5);}}
</style>
</head>
<body>

<h1>Extreme Maze Challenge</h1>
<p>💀 극한 난이도! 목표까지 도달하세요!</p>
<div id="mazeContainer">
<div id="maze"></div>
</div>
<p id="stage">Stage: 1</p>
<p id="message"></p>

<script>
// ==================== 변수 ====================
const size = 50; // 50x50 극한 미로
let playerPos = {row:0,col:0};
let cells = [];
let stage = 1;
let map = [];
const mazeDiv = document.getElementById("maze");

// ==================== 미로 생성 ====================
function generateMaze(){
    map=[];
    cells=[];
    mazeDiv.innerHTML="";
    for(let r=0;r<size;r++){
        map[r]=[];
        for(let c=0;c<size;c++){
            const cell = document.createElement("div");
            cell.className="cell";
            mazeDiv.appendChild(cell);
            cells.push(cell);

            // 경계 + 무작위 벽
            if(r===0||r===size-1||c===0||c===size-1 || Math.random()<0.3+stage*0.05){
                cell.classList.add("wall");
                map[r][c]=1;
            } else map[r][c]=0;
        }
    }

    // 시작점
    map[1][1]=2;
    cells[1*size+1].classList.add("player");
    cells[1*size+1].innerHTML="🐶";
    playerPos={row:1,col:1};

    // 목표
    const goalRow=size-2;
    const goalCol=size-2;
    map[goalRow][goalCol]=3;
    cells[goalRow*size+goalCol].classList.add("goal");
}

// ==================== 이동 ====================
function movePlayer(dr,dc){
    const newRow = playerPos.row + dr;
    const newCol = playerPos.col + dc;
    if(newRow<0||newRow>=size||newCol<0||newCol>=size) return;
    if(map[newRow][newCol]===1) return;

    const oldCell = cells[playerPos.row*size + playerPos.col];
    const paw = document.createElement("div");
    paw.className="paw";
    paw.innerHTML="🐾";
    paw.style.left = oldCell.offsetLeft + 8 + "px";
    paw.style.top = oldCell.offsetTop + 8 + "px";
    mazeDiv.appendChild(paw);
    setTimeout(()=>paw.remove(),2000);

    oldCell.classList.remove("player");
    oldCell.innerHTML="";

    playerPos.row=newRow;
    playerPos.col=newCol;

    const newCell = cells[newRow*size + newCol];
    newCell.classList.add("player");
    newCell.innerHTML="🐶";

    if(map[newRow][newCol]===3){
        document.getElementById("message").innerText="🎉 스테이지 클리어!";
        stage++;
        setTimeout(()=>{
            generateMaze();
            document.getElementById("stage").innerText="Stage: "+stage;
            document.getElementById("message").innerText="";
        },500);
    }
}

// ==================== 키보드 ====================
document.addEventListener("keydown", e=>{
    if(e.key==="ArrowUp") movePlayer(-1,0);
    if(e.key==="ArrowDown") movePlayer(1,0);
    if(e.key==="ArrowLeft") movePlayer(0,-1);
    if(e.key==="ArrowRight") movePlayer(0,1);
});

// ==================== 게임 시작 ====================
generateMaze();
</script>

</body>
</html>
