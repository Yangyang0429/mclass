<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dachshund Fetch Game</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
text-align:center;
padding-top:80px;
overflow:hidden;
}

h1{color:#333;}
p{color:#666;}

#dog{
margin-top:30px;
width:200px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
position:absolute;
left:50%;
transform:translateX(-50%);
transition:1s linear;
}

.ball{
position:absolute;
font-size:28px;
pointer-events:none;
}

.paw{
position:absolute;
font-size:22px;
pointer-events:none;
animation:fadepaw 2s forwards;
}

@keyframes fadepaw{
0%{opacity:0; transform:scale(0.5);}
30%{opacity:1;}
100%{opacity:0; transform:scale(0.8);}
}

</style>
</head>

<body>

<h1>Tomcat Web Server</h1>
<h1>🐶 Welcome</h1>
<p>닥스훈트 입니다! (클릭해서 공 던지기)</p>

<img id="dog" src="https://contents.creators.mypetlife.co.kr/content/uploads/2021/10/09095442/img-751.jpg">

<p>Powered by 🦴</p>

<script>

const dog=document.getElementById("dog")

let centerX=window.innerWidth/2
let centerY=300

dog.style.left=centerX+"px"
dog.style.top=centerY+"px"


function createPaw(x,y){

let paw=document.createElement("div")
paw.className="paw"
paw.innerHTML="🐾"

paw.style.left=x+"px"
paw.style.top=y+"px"

document.body.appendChild(paw)

setTimeout(()=>paw.remove(),2000)

}


// 공 던지기
document.addEventListener("click",function(e){

let ball=document.createElement("div")

ball.className="ball"
ball.innerHTML="🎾"

ball.style.left=e.clientX+"px"
ball.style.top=e.clientY+"px"

document.body.appendChild(ball)

moveDog(e.clientX,e.clientY,ball)

})


// 강아지 이동
function moveDog(x,y,ball){

let dogX=dog.offsetLeft
let dogY=dog.offsetTop

let steps=30
let i=0

let move=setInterval(()=>{

dogX+=(x-dogX)/10
dogY+=(y-dogY)/10

dog.style.left=dogX+"px"
dog.style.top=dogY+"px"

createPaw(dogX+80,dogY+120)

i++

if(i>steps){

clearInterval(move)

ball.remove()

setTimeout(()=>{
returnDog()
},500)

}

},30)

}


// 중앙으로 복귀
function returnDog(){

dog.style.left=centerX+"px"
dog.style.top=centerY+"px"

}

</script>

</body>
</html>
