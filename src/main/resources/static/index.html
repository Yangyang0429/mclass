<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}

h1 { color: #333; text-align: center; }
p { color: #666; text-align: center; }

/* 닥스훈트 이미지 중앙 고정 */
#dog {
    width: 300px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
}

/* 발자국 스타일 */
.paw {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
    opacity: 0.8;
    transform: translate(-50%, -50%);
    animation: fadePaw 3s forwards;
}

@keyframes fadePaw {
    0% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
}
</style>
</head>
<body>

<h1>Tomcat Web Server</h1>
<h1>🐶 Welcome</h1>
<p>닥스훈트 입니다!</p>

<img id="dog" src="https://contents.creators.mypetlife.co.kr/content/uploads/2021/10/09095442/img-751.jpg">

<script>
// 마우스를 따라가는 발자국
document.addEventListener("mousemove", (e) => {
    const paw = document.createElement("div");
    paw.className = "paw";
    paw.innerHTML = "🐾";
    paw.style.left = e.pageX + "px";
    paw.style.top = e.pageY + "px";
    document.body.appendChild(paw);

    // 3초 후 발자국 제거
    setTimeout(() => {
        paw.remove();
    }, 3000);
});
</script>

</body>
</html>
