<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Tomcat Wall Breaker</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f5f9;
    margin: 0;
    height: 100vh;
    overflow: hidden;
    position: relative;
}

/* 닥스훈트 중앙 고정 */
#dog {
    width: 150px;
    position: fixed;
    bottom: 50px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
}

/* 발자국 */
.paw {
    position: absolute;
    font-size: 24px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: fadePaw 3s forwards;
    z-index: 5;
}

@keyframes fadePaw {
    0% { opacity: 1; }
    100% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
}

/* 공 */
.ball {
    position: absolute;
    font-size: 40px;
    z-index: 3;
}

/* 벽 블록 */
.block {
    position: absolute;
    width: 60px;
    height: 30px;
    background: #ff6347;
    border: 2px solid #333;
    z-index: 1;
}
</style>
</head>
<body>

<h1 style="text-align:center;">Tomcat Wall Breaker</h1>
<p style="text-align:center;">🐶 닥스훈트와 함께 공으로 벽을 부수세요!</p>

<img id="dog" src="https://contents.creators.mypetlife.co.kr/content/uploads/2021/10/09095442/img-751.jpg">

<script>
// 마우스 따라 발자국
document.addEventListener("mousemove", (e) => {
    const paw = document.createElement("div");
    paw.className = "paw";
    paw.innerHTML = "🐾";
    paw.style.left = e.pageX + "px";
    paw.style.top = e.pageY + "px";
    document.body.appendChild(paw);
    setTimeout(() => paw.remove(), 3000);
});

// 벽 생성
let blocks = [];
const rows = 3;
const cols = 8;
const startX = 50;
const startY = 50;
const spacingX = 70;
const spacingY = 40;

for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
        const block = document.createElement("div");
        block.className = "block";
        block.style.left = startX + c*spacingX + "px";
        block.style.top = startY + r*spacingY + "px";
        document.body.appendChild(block);
        blocks.push(block);
    }
}

// 공 생성 및 이동
function createBall() {
    const ball = document.createElement("div");
    ball.className = "ball";
    ball.innerHTML = "🎾";

    // 닥스훈트 중앙 위에서 시작
    const dog = document.getElementById("dog");
    const dogRect = dog.getBoundingClientRect();
    ball.style.left = (dogRect.left + dogRect.width/2 - 20) + "px";
    ball.style.top = (dogRect.top - 40) + "px";

    document.body.appendChild(ball);
    moveBall(ball);
}

function moveBall(ball){
    let top = parseFloat(ball.style.top);
    let speed = 6;

    const interval = setInterval(() => {
        top -= speed;
        ball.style.top = top + "px";

        const ballRect = ball.getBoundingClientRect();

        // 충돌 체크
        for(let i=0;i<blocks.length;i++){
            const block = blocks[i];
            if(!block) continue;
            const bRect = block.getBoundingClientRect();
            if(ballRect.bottom > bRect.top &&
               ballRect.top < bRect.bottom &&
               ballRect.left + ballRect.width > bRect.left &&
               ballRect.left < bRect.right) {
                   // 벽 제거
                   block.remove();
                   blocks[i] = null;

                   // 공 제거
                   ball.remove();

                   // 작은 발자국 효과
                   for(let j=0;j<3;j++){
                       setTimeout(()=>{
                           const paw = document.createElement("div");
                           paw.className="paw";
                           paw.innerHTML="💥";
                           paw.style.left = (bRect.left + bRect.width/2 + Math.random()*20 -10) + "px";
                           paw.style.top = (bRect.top + bRect.height/2 + Math.random()*20 -10) + "px";
                           document.body.appendChild(paw);
                           setTimeout(()=>paw.remove(),1000);
                       }, j*50);
                   }

                   clearInterval(interval);
                   return;
            }
        }

        // 화면 위로 나가면 제거
        if(top < -50){
            ball.remove();
            clearInterval(interval);
        }
    }, 20);
}

// 클릭 시 공 발사
document.addEventListener("click", createBall);

// 키보드로 닥스훈트 좌우 이동
let dogX = window.innerWidth/2 - 75;
document.addEventListener("keydown", (e)=>{
    if(e.key==="ArrowLeft") dogX -= 30;
    if(e.key==="ArrowRight") dogX += 30;
    dogX = Math.max(0, Math.min(window.innerWidth-150, dogX));
    document.getElementById("dog").style.left = dogX + "px";
});
</script>
</body>
</html>
