<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Extreme Maze Game</title>

<style>

body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial;
    text-align:center;
}

#game{
    width:600px;
    height:600px;
    margin:auto;
    overflow:hidden;
    border:3px solid white;
    position:relative;
}

#maze{
    position:absolute;
    display:grid;
}

.cell{
    width:20px;
    height:20px;
}

.wall{background:#333;}
.path{background:#1a1a1a;}

.goal{background:red;}

.player{
    position:absolute;
    width:20px;
    height:20px;
    background:#00bfff;
    border-radius:50%;
    z-index:10;
}

.paw{
    position:absolute;
    font-size:12px;
    opacity:0.8;
    pointer-events:none;
}

</style>
</head>

<body>

<h1>🔥 Extreme Maze Challenge</h1>
<p>Arrow Keys 로 이동</p>
<p id="stage">Stage 1</p>

<div id="game">
<div id="maze"></div>
<div id="player"></div>
</div>

<script>

let stage=1
let size=21
let maze=[]
let player={x:1,y:1}

const mazeDiv=document.getElementById("maze")
const playerDiv=document.getElementById("player")

function generateMaze(){

size=21+stage*4
maze=[]
mazeDiv.innerHTML=""

for(let y=0;y<size;y++){
maze[y]=[]
for(let x=0;x<size;x++){
maze[y][x]=1
}
}

function carve(x,y){
let dirs=[[2,0],[-2,0],[0,2],[0,-2]]
dirs.sort(()=>Math.random()-0.5)

for(let d of dirs){
let nx=x+d[0]
let ny=y+d[1]

if(nx>0 && ny>0 && nx<size-1 && ny<size-1 && maze[ny][nx]==1){
maze[ny][nx]=0
maze[y+d[1]/2][x+d[0]/2]=0
carve(nx,ny)
}
}
}

maze[1][1]=0
carve(1,1)

maze[size-2][size-2]=2

drawMaze()

player={x:1,y:1}
updateCamera()

}

function drawMaze(){

mazeDiv.style.gridTemplateColumns=`repeat(${size},20px)`

for(let y=0;y<size;y++){
for(let x=0;x<size;x++){

let cell=document.createElement("div")
cell.classList.add("cell")

if(maze[y][x]==1) cell.classList.add("wall")
else cell.classList.add("path")

if(maze[y][x]==2) cell.classList.add("goal")

mazeDiv.appendChild(cell)

}
}

}

function updateCamera(){

playerDiv.style.left="290px"
playerDiv.style.top="290px"

mazeDiv.style.left=300-player.x*20+"px"
mazeDiv.style.top=300-player.y*20+"px"

}

function move(dx,dy){

let nx=player.x+dx
let ny=player.y+dy

if(maze[ny][nx]==1) return

createPaw()

player.x=nx
player.y=ny

updateCamera()

if(maze[ny][nx]==2){

alert("🎉 Stage Clear!")

stage++

document.getElementById("stage").innerText="Stage "+stage

generateMaze()

}

}

function createPaw(){

let paw=document.createElement("div")

paw.className="paw"
paw.innerText="🐾"

paw.style.left="295px"
paw.style.top="295px"

document.getElementById("game").appendChild(paw)

setTimeout(()=>paw.remove(),1000)

}

document.addEventListener("keydown",e=>{

if(e.key=="ArrowUp") move(0,-1)
if(e.key=="ArrowDown") move(0,1)
if(e.key=="ArrowLeft") move(-1,0)
if(e.key=="ArrowRight") move(1,0)

})

generateMaze()

</script>

</body>
</html>
