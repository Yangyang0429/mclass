<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Web Sudoku Game</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f0f5f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 30px;
}

h1 { color: #333; margin-bottom: 10px; }

#sudoku {
    display: grid;
    grid-template-columns: repeat(9, 50px);
    grid-template-rows: repeat(9, 50px);
    gap: 2px;
}

.cell {
    width: 50px;
    height: 50px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 20px;
    border: 1px solid #999;
    background: #fff;
}

.cell.prefilled {
    background: #d3e0ea;
    font-weight: bold;
}

.cell.invalid {
    background: #ff6b6b;
}
</style>
</head>
<body>

<h1>Sudoku Game</h1>
<div id="sudoku"></div>
<p id="message"></p>

<script>
// ==================== 퍼즐 예제 ====================
// 0 = 빈 칸
const puzzle = [
[5,3,0,0,7,0,0,0,0],
[6,0,0,1,9,5,0,0,0],
[0,9,8,0,0,0,0,6,0],
[8,0,0,0,6,0,0,0,3],
[4,0,0,8,0,3,0,0,1],
[7,0,0,0,2,0,0,0,6],
[0,6,0,0,0,0,2,8,0],
[0,0,0,4,1,9,0,0,5],
[0,0,0,0,8,0,0,7,9]
];

// ==================== UI 생성 ====================
const sudoku = document.getElementById("sudoku");
for(let i=0;i<9;i++){
    for(let j=0;j<9;j++){
        const cell = document.createElement("input");
        cell.type="text";
        cell.maxLength=1;
        cell.className="cell";
        cell.dataset.row=i;
        cell.dataset.col=j;

        if(puzzle[i][j]!==0){
            cell.value=puzzle[i][j];
            cell.disabled = true;
            cell.classList.add("prefilled");
        }

        sudoku.appendChild(cell);
    }
}

// ==================== 입력 체크 ====================
function checkSudoku(){
    let cells = document.querySelectorAll(".cell");
    let valid = true;

    for(let i=0;i<9;i++){
        for(let j=0;j<9;j++){
            let cell = document.querySelector(`.cell[data-row='${i}'][data-col='${j}']`);
            cell.classList.remove("invalid");
            let val = parseInt(cell.value);

            if(isNaN(val) || val<1 || val>9){
                valid=false;
                continue;
            }

            // 행 체크
            for(let c=0;c<9;c++){
                if(c!==j){
                    let other = document.querySelector(`.cell[data-row='${i}'][data-col='${c}']`);
                    if(parseInt(other.value)===val) cell.classList.add("invalid");
                }
            }

            // 열 체크
            for(let r=0;r<9;r++){
                if(r!==i){
                    let other = document.querySelector(`.cell[data-row='${r}'][data-col='${j}']`);
                    if(parseInt(other.value)===val) cell.classList.add("invalid");
                }
            }

            // 3x3 박스 체크
            let startRow = Math.floor(i/3)*3;
            let startCol = Math.floor(j/3)*3;
            for(let r=startRow;r<startRow+3;r++){
                for(let c=startCol;c<startCol+3;c++){
                    if(r===i && c===j) continue;
                    let other = document.querySelector(`.cell[data-row='${r}'][data-col='${c}']`);
                    if(parseInt(other.value)===val) cell.classList.add("invalid");
                }
            }

            if(cell.classList.contains("invalid")) valid=false;
        }
    }

    return valid;
}

// ==================== 입력 이벤트 ====================
let cells = document.querySelectorAll(".cell");
cells.forEach(cell=>{
    cell.addEventListener("input", ()=>{
        if(cell.value.length>0){
            cell.value = cell.value.replace(/[^1-9]/g,'');
        }
        if(checkSudoku()){
            document.getElementById("message").innerText="🎉 축하합니다! 퍼즐 완성!";
        } else {
            document.getElementById("message").innerText="";
        }
    });
});
</script>

</body>
</html>
