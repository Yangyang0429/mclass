<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Welcome</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
text-align:center;
padding-top:80px;
overflow:hidden;
}

h1{color:#333;}
p{color:#666;}

img{
margin-top:30px;
width:300px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* 발자국 스타일 */
.paw{
position:absolute;
font-size:26px;
pointer-events:none;
animation:fadepaw 2s ease forwards;
}

/* 나타났다 사라지는 애니메이션 */
@keyframes fadepaw{

0%{
opacity:0;
transform:scale(0.5);
}

20%{
opacity:1;
transform:scale(1);
}

80%{
opacity:1;
}

100%{
opacity:0;
transform:scale(0.8);
}

}

</style>
</head>

<body>

<h1> Tomcat Web Server </h1>
<h1>🐶 Welcome </h1>
<p>닥스훈트 입니다!</p>

<img src="https://contents.creators.mypetlife.co.kr/content/uploads/2021/10/09095442/img-751.jpg" alt="닥스훈트">

<p>Powered by 🦴</p>

<script>

let lastX=0
let lastY=0

document.addEventListener("mousemove",function(e){

let dx=Math.abs(e.clientX-lastX)
let dy=Math.abs(e.clientY-lastY)

if(dx+dy>25){

let paw=document.createElement("div")

paw.className="paw"
paw.innerHTML="🐾"

paw.style.left=e.clientX+"px"
paw.style.top=e.clientY+"px"

paw.style.transform="rotate("+(Math.random()*40-20)+"deg)"

document.body.appendChild(paw)

setTimeout(()=>{
paw.remove()
},2000)

lastX=e.clientX
lastY=e.clientY

}

})

</script>

</body>
</html>
