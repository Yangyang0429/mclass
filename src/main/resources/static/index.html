<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Word Search Game</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #f5f7fa;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 40px;
}

h1 { color: #333; }
#wordList {
    margin: 20px 0;
    font-size: 18px;
}

#grid {
    display: grid;
    grid-template-columns: repeat(10, 40px);
    grid-template-rows: repeat(10, 40px);
    gap: 2px;
}

.cell {
    width: 40px;
    height: 40px;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #fff;
    border: 1px solid #ccc;
    font-weight: bold;
    user-select: none;
    cursor: pointer;
    font-size: 18px;
    transition: background 0.3s;
}

.cell.selected {
    background: #90ee90;
    color: #000;
}
</style>
</head>
<body>

<h1>Word Search Game</h1>
<div id="wordList">Words: <span id="words"></span></div>
<div id="grid"></div>
<p id="message"></p>

<script>
const wordsToFind = ["DOG", "CAT", "BONE", "BALL", "PUPPY"];
const gridSize = 10;
let grid = [];
let foundWords = [];
const gridElement = document.getElementById("grid");
const wordListElement = document.getElementById("words");
const messageElement = document.getElementById("message");

// 단어 목록 표시
wordListElement.textContent = wordsToFind.join(", ");

// 격자 생성
for(let i=0;i<gridSize;i++){
    grid[i] = [];
    for(let j=0;j<gridSize;j++){
        const letter = String.fromCharCode(65 + Math.floor(Math.random()*26));
        grid[i][j] = letter;

        const cell = document.createElement("div");
        cell.className = "cell";
        cell.dataset.row = i;
        cell.dataset.col = j;
        cell.textContent = letter;
        gridElement.appendChild(cell);
    }
}

// 단어 삽입 (가로만 간단하게)
wordsToFind.forEach(word=>{
    const row = Math.floor(Math.random()*gridSize);
    const col = Math.floor(Math.random()*(gridSize - word.length));
    for(let i=0;i<word.length;i++){
        const cellIndex = row*gridSize + (col+i);
        gridElement.children[cellIndex].textContent = word[i];
        grid[row][col+i] = word[i];
    }
});

// 마우스 드래그 선택
let selecting = false;
let selectedCells = [];

gridElement.addEventListener("mousedown", (e)=>{
    if(e.target.classList.contains("cell")){
        selecting = true;
        selectedCells = [e.target];
        e.target.classList.add("selected");
    }
});

gridElement.addEventListener("mouseover", (e)=>{
    if(selecting && e.target.classList.contains("cell") && !selectedCells.includes(e.target)){
        selectedCells.push(e.target);
        e.target.classList.add("selected");
    }
});

document.addEventListener("mouseup", ()=>{
    if(selecting){
        selecting = false;
        const selectedWord = selectedCells.map(c=>c.textContent).join("");
        const reversedWord = selectedWord.split("").reverse().join("");

        if(wordsToFind.includes(selectedWord) && !foundWords.includes(selectedWord)){
            foundWords.push(selectedWord);
        } else if(wordsToFind.includes(reversedWord) && !foundWords.includes(reversedWord)){
            foundWords.push(reversedWord);
        } else {
            // 선택 초기화
            selectedCells.forEach(c=>c.classList.remove("selected"));
        }

        selectedCells = [];

        // 모두 찾으면 메시지
        if(foundWords.length === wordsToFind.length){
            messageElement.textContent = "🎉 축하합니다! 모든 단어를 찾았습니다!";
        }
    }
});
</script>

</body>
</html>
