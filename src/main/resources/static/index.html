<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Dachshund Play Page</title>

<style>

body{
font-family:Arial,sans-serif;
background:#f5f7fa;
text-align:center;
padding-top:80px;
overflow:hidden;
}

/* 글자 항상 위 */
.content{
position:relative;
z-index:10;
}

h1{color:#333}
p{color:#666}

img{
margin-top:30px;
width:300px;
border-radius:12px;
box-shadow:0 8px 20px rgba(0,0,0,0.15);
}

/* 발자국 */
.paw{
position:absolute;
font-size:24px;
pointer-events:none;
animation:step 0.4s ease;
}

@keyframes step{
0%{transform:scale(0);opacity:0;}
100%{transform:scale(1);opacity:1;}
}

/* 그림판 */
canvas{
position:absolute;
top:0;
left:0;
z-index:1;
}

/* UI */
.tools{
position:fixed;
top:10px;
right:10px;
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.15);
z-index:20;
}

</style>
</head>

<body>

<div class="tools">
🎨 Color  
<input type="color" id="color" value="#000000">
<button onclick="clearCanvas()">Clear</button>
</div>

<canvas id="draw"></canvas>

<div class="content">
<h1> Tomcat Web Server </h1>
<h1>🐶 Welcome </h1>
<p>닥스훈트 입니다!</p>

<img src="https://contents.creators.mypetlife.co.kr/content/uploads/2021/10/09095442/img-751.jpg">

<p>Powered by 🦴</p>
</div>

<script>

/* 캔버스 설정 */

const canvas=document.getElementById("draw")
const ctx=canvas.getContext("2d")

canvas.width=window.innerWidth
canvas.height=window.innerHeight

let drawing=false

canvas.addEventListener("mousedown",()=>drawing=true)
canvas.addEventListener("mouseup",()=>drawing=false)

canvas.addEventListener("mousemove",draw)

function draw(e){

if(!drawing) return

ctx.lineWidth=4
ctx.lineCap="round"
ctx.strokeStyle=document.getElementById("color").value

ctx.lineTo(e.clientX,e.clientY)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(e.clientX,e.clientY)

}

/* 지우기 */

function clearCanvas(){
ctx.clearRect(0,0,canvas.width,canvas.height)
}


/* 발자국 */

let lastX=0
let lastY=0

document.addEventListener("mousemove",function(e){

let dx=Math.abs(e.clientX-lastX)
let dy=Math.abs(e.clientY-lastY)

if(dx+dy>25){

let paw=document.createElement("div")

paw.className="paw"
paw.innerHTML="🐾"

paw.style.left=e.clientX+"px"
paw.style.top=e.clientY+"px"

paw.style.transform="rotate("+(Math.random()*60-30)+"deg)"

document.body.appendChild(paw)

lastX=e.clientX
lastY=e.clientY

}

})

</script>

</body>
</html>
